<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumePro by Ritik - Build Your Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF + html2canvas for direct PDF download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
      
        :root { --accent: #2563eb; }
      
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
      
        .tail-container * { font-family: 'Inter', system_ui, sans-serif; }
      
        .resume-preview {
            font-family: 'Inter', system_ui, sans-serif;
            background-color: white;
            width: 210mm;
            height: 297mm;
            margin: 0 auto;
            overflow: hidden;
        }
      
        .classic .resume-header { border-bottom: 4px solid #2563eb; }
        .modern .resume-header { background: linear-gradient(90deg, #2563eb, #3b82f6); color: white; }
      
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="tail-container bg-gray-50">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-inner">📄</div>
                <div><h1 class="text-2xl font-semibold tracking-tight text-gray-900">ResumePro by Ritik</h1></div>
            </div>
          
            <div class="flex items-center gap-x-3">
                <div class="flex items-center bg-gray-100 rounded-3xl p-1 text-sm font-medium">
                    <button onclick="switchTemplate(0)" id="template-btn-0" class="template-btn px-5 py-2 rounded-3xl flex items-center gap-x-2 hover:bg-white hover:shadow-sm data-[active=true]:bg-white">📋 Classic</button>
                    <button onclick="switchTemplate(1)" id="template-btn-1" class="template-btn px-5 py-2 rounded-3xl flex items-center gap-x-2 hover:bg-white hover:shadow-sm data-[active=true]:bg-white">✦ Modern</button>
                </div>
              
                <div class="flex items-center gap-x-2">
                    <button onclick="fillSampleData()" class="flex items-center gap-x-2 px-4 py-2.5 bg-white border border-gray-300 hover:border-gray-400 rounded-2xl text-sm font-semibold">📋 Sample</button>
                    <button onclick="clearForm()" class="flex items-center gap-x-2 px-4 py-2.5 bg-white border border-red-200 hover:border-red-300 text-red-500 hover:text-red-600 rounded-2xl text-sm font-semibold">🗑️ Clear</button>
                    <button onclick="saveAsPDF()" class="flex items-center gap-x-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-2xl text-sm font-semibold shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h-10m4-4v8m-4-8V7m8 4V7" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 17V5a2 2 0 012-2h12a2 2 0 01-2 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2z" />
                        </svg>
                        Download PDF
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- FORM PANEL (same as before) -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-xl border border-gray-100 p-8 no-print">
                <!-- ... (poora form same rakha hai) ... -->
                <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-semibold text-gray-900">Build Your Resume</h2></div>
                
                <!-- Personal Information, Summary, Skills, Education, Experience, Projects -->
                <!-- (Yeh part previous code jaisa hi hai, space bachane ke liye yahan short kiya hai) -->
                <div class="mb-8">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-x-2">👤 Personal Information</h3>
                    <div class="flex justify-between items-start gap-6">
                        <div class="flex-1 space-y-4">
                            <div><label class="block text-sm font-medium text-gray-600 mb-1">Full Name</label><input id="name" type="text" oninput="updateField('name', this.value)" class="form-input w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none"></div>
                            <div><label class="block text-sm font-medium text-gray-600 mb-1">Headline</label><input id="headline" type="text" placeholder="e.g. Full Stack Developer" oninput="updateField('headline', this.value)" class="form-input w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none"></div>
                        </div>
                        <label class="photo-upload cursor-pointer w-28 h-28 border-2 border-dashed border-blue-300 hover:border-blue-400 rounded-2xl bg-blue-50 overflow-hidden flex-shrink-0">
                            <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                            <div id="photo-preview" class="w-full h-full flex items-center justify-center">
                                <div class="text-center"><svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-400 mx-auto mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg><p class="text-xs text-blue-500 font-medium">Photo</p></div>
                            </div>
                        </label>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                        <div><label class="block text-sm font-medium text-gray-600 mb-1">Email</label><input id="email" type="email" oninput="updateField('email', this.value)" class="form-input w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none"></div>
                        <div><label class="block text-sm font-medium text-gray-600 mb-1">Phone</label><input id="phone" type="tel" oninput="updateField('phone', this.value)" class="form-input w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none"></div>
                        <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-600 mb-1">Address</label><input id="address" type="text" oninput="updateField('address', this.value)" class="form-input w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none"></div>
                    </div>
                </div>

                <div class="mb-8"><h3 class="text-lg font-semibold text-gray-800 mb-3">📝 Profile Summary</h3><textarea id="summary" rows="4" placeholder="Write a short professional summary..." oninput="updateField('summary', this.value)" class="form-input w-full px-4 py-3 border border-gray-200 rounded-3xl focus:outline-none resize-none"></textarea></div>

                <div class="mb-8">
                    <div class="flex justify-between items-center mb-3"><h3 class="text-lg font-semibold text-gray-800">🛠️ Skills</h3>
                        <div class="flex gap-2"><input id="skill-input" type="text" placeholder="Add skill" class="px-4 py-2 text-sm border border-gray-200 rounded-2xl focus:outline-none w-52"><button onclick="addSkill()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-2xl text-sm font-semibold">+ Add</button></div>
                    </div>
                    <div id="skills-container" class="flex flex-wrap gap-2 min-h-[50px]"></div>
                </div>

                <div class="mb-8"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-semibold text-gray-800">🎓 Education</h3><button onclick="addEducation()" class="text-blue-600 hover:text-blue-700 text-sm font-semibold">+ Add</button></div><div id="education-container" class="space-y-6"></div></div>
                <div class="mb-8"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-semibold text-gray-800">💼 Experience</h3><button onclick="addExperience()" class="text-blue-600 hover:text-blue-700 text-sm font-semibold">+ Add</button></div><div id="experience-container" class="space-y-6"></div></div>
                <div><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-semibold text-gray-800">🚀 Projects</h3><button onclick="addProject()" class="text-blue-600 hover:text-blue-700 text-sm font-semibold">+ Add</button></div><div id="projects-container" class="space-y-6"></div></div>
            </div>
          
            <!-- PURE RESUME A4 -->
            <div class="lg:col-span-7">
                <div id="preview-wrapper">
                    <div id="resume-preview" class="resume-preview mx-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let resumeData = { name:'', headline:'', email:'', phone:'', address:'', photo:'', summary:'', skills:[], education:[], experience:[], projects:[], template:0 };

        // All your existing functions (updateField, handlePhotoUpload, addSkill, renderSkills, education/experience/projects functions) same as before
        function updateField(key, value){ resumeData[key]=value; renderPreview(); }
        function handlePhotoUpload(e){ const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=function(ev){ resumeData.photo=ev.target.result; document.getElementById('photo-preview').innerHTML=`<img src="${resumeData.photo}" class="w-full h-full object-cover">`; renderPreview(); }; reader.readAsDataURL(file); }
        // ... (baaki sab functions same rakhe hain - space bachane ke liye yahan short kiya hai, previous message se copy kar lena)

        function renderPreview(){ /* same as last version */ 
            // (poora renderPreview function previous message wala use kar sakte ho)
            const container = document.getElementById('resume-preview');
            const isClassic = resumeData.template === 0;
            let html = `<div class="${isClassic ? 'classic' : 'modern'}"><div class="p-5 text-sm leading-relaxed"> ... (same resume HTML) ... </div></div>`;
            container.innerHTML = html;
        }

        // NEW DIRECT DOWNLOAD FUNCTION
        async function saveAsPDF() {
            const preview = document.getElementById('resume-preview');
            const loading = document.createElement('div');
            loading.style.position = 'fixed';
            loading.style.top = '50%';
            loading.style.left = '50%';
            loading.style.transform = 'translate(-50%, -50%)';
            loading.style.background = 'rgba(0,0,0,0.8)';
            loading.style.color = 'white';
            loading.style.padding = '20px 30px';
            loading.style.borderRadius = '12px';
            loading.innerHTML = 'Generating PDF... Please wait';
            document.body.appendChild(loading);

            try {
                const canvas = await html2canvas(preview, { scale: 2, useCORS: true });
                const imgData = canvas.toDataURL('image/png');

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });

                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);

                pdf.save('Ritik_Resume.pdf');
            } catch (err) {
                alert('PDF generate karne mein error aaya. Please try again.');
            } finally {
                loading.remove();
            }
        }

        // Template switch, fillSampleData, clearForm same as before
        function switchTemplate(index){ resumeData.template = index; document.querySelectorAll('.template-btn').forEach((btn,i)=> btn.dataset.active = (i===index).toString()); renderPreview(); }
        // fillSampleData aur clearForm bhi same rakho

        window.onload = function() {
            // initial render calls
            renderPreview();
            console.log('%c✅ Direct PDF Download Ready (Mobile + Laptop)', 'color:#2563eb;font-weight:600');
        };
    </script>
</body>
</html>
